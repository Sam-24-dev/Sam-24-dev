name: Portfolio Quality Index

on:
  schedule:
    - cron: "0 3 * * 1"
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - README.md
      - assets/portfolio-quality.json
      - scripts/update_portfolio_quality.py

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Update Portfolio Quality Index
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python scripts/update_portfolio_quality.py

      - name: Commit changes
        run: |
          if git diff --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md
          git commit -m "Update portfolio quality index"
          git push
