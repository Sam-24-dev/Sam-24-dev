name: README Link Check

on:
  schedule:
    - cron: "0 4 * * 1"
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - README.md

permissions:
  contents: read

jobs:
  link-check:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Check README links
        uses: lycheeverse/lychee-action@v1
        with:
          args: >-
            --no-progress
            --verbose
            --exclude-mail
            --exclude "https://www.linkedin.com/.*"
            --timeout 20
            README.md
          fail: true
