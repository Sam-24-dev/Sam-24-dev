name: Waka Readme Stats

on:
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * *'

jobs:
  update-readme:
    name: Update Readme with Wakatime Stats
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Update Readme with Wakatime Stats
        uses: anmol098/waka-readme-stats@master
        with:
          WAKATIME_API_KEY: ${{ secrets.WAKATIME_API_KEY }}
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          SHOW_OS: "False"          # Windows solo no aporta nada
          SHOW_PROJECTS: "True"     # ✅ Muestra en qué proyecto trabajas
          SHOW_EDITORS: "False"     # VSCode obvio, no aporta
          SHOW_TIMEZONE: "False"
          SHOW_LANGUAGE: "True"     # ✅ Lo más importante - tus lenguajes
          SHOW_COMMIT: "True"       # ✅ Distribución de commits por hora
          SHOW_DAYS_OF_WEEK: "True" # ✅ Qué días más productivo
          SHOW_LANGUAGE_PER_REPO: "False"
          SHOW_SHORT_INFO: "False"  # ❌ Quita el bloque My GitHub Data
          SHOW_LOC_CHART: "False"
          SHOW_PROFILE_VIEWS: "False" # ❌ Quita el badge redundante
          LOCALE: "en"
          COMMIT_MESSAGE: "📊 Update WakaTime stats"
